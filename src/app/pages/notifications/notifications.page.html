<app-admin-shell pageTitle="Notifications">
  <div class="page-header">
    <h2 class="page-title">Notifications<span class="count-badge">{{ unreadCount() }} Unread</span></h2>
    <button type="button" class="btn-primary" (click)="openModal()">Send Notification</button>
  </div>

  <div class="tab-bar">
    <button type="button" class="tab" [class.active]="tab==='all'" (click)="tab='all'">All</button>
    <button type="button" class="tab" [class.active]="tab==='unread'" (click)="tab='unread'">Unread</button>
    <button type="button" class="tab" [class.active]="tab==='sent'" (click)="tab='sent'">Sent Pushes</button>
  </div>

  <div class="notif-list">
    <div class="notif-card card" *ngFor="let n of filtered" [class.unread]="!n.read">
      <div class="notif-icon" [attr.data-type]="n.type">
        <ion-icon [name]="iconFor(n.type) + '-outline'"></ion-icon>
      </div>
      <div class="notif-body">
        <h4>{{ n.title }}</h4>
        <p>{{ n.message }}</p>
        <span class="meta">{{ n.timestamp }} · {{ n.audience }}</span>
      </div>
      <div class="notif-actions">
        <button type="button" class="icon-btn" *ngIf="!n.read" (click)="markRead(n)"><ion-icon name="checkmark-outline"></ion-icon></button>
        <button type="button" class="icon-btn danger" (click)="delete(n)"><ion-icon name="trash-outline"></ion-icon></button>
      </div>
    </div>
    <div class="empty-state" *ngIf="!filtered.length"><ion-icon name="notifications-outline"></ion-icon><p>No notifications</p></div>
  </div>

  <ion-modal [isOpen]="modalOpen" (didDismiss)="closeModal()">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Send Notification</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeModal()">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <form [formGroup]="sendForm" (ngSubmit)="send()">
          <div class="form-field">
            <label>Title</label>
            <input formControlName="title" />
          </div>
          <div class="form-field">
            <label>Message</label>
            <textarea formControlName="message"></textarea>
          </div>
          <div class="form-field">
            <label>Target Audience</label>
            <select formControlName="audience" class="select-input" style="width:100%;height:44px">
              <option value="all_users">All Users</option>
              <option value="all_partners">Partners</option>
              <option value="all_drivers">Drivers</option>
            </select>
          </div>
          <div class="form-field row-toggle">
            <label>Schedule</label>
            <ion-toggle [(ngModel)]="scheduleEnabled" [ngModelOptions]="{standalone:true}"></ion-toggle>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-ghost" (click)="closeModal()">Cancel</button>
            <button type="submit" class="btn-primary">Send Now</button>
          </div>
        </form>
      </ion-content>
    </ng-template>
  </ion-modal>
</app-admin-shell>
