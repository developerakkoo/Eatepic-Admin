<ion-content [fullscreen]="true" class="auth-page">
  <div class="auth-layout">
    <aside class="auth-brand">
      <div class="brand-inner">
        <h1 class="logo">FoodAdmin</h1>
        <p class="tagline">Manage your food delivery empire with ease</p>
        <ul class="features">
          <li *ngFor="let f of features">
            <ion-icon name="checkmark-circle" class="check"></ion-icon>
            {{ f }}
          </li>
        </ul>
      </div>
    </aside>

    <section class="auth-form-section">
      <div class="auth-card card">
        <h2>Sign In</h2>
        <p class="subtitle">Welcome back! Enter your credentials.</p>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="form-field">
            <label>Email</label>
            <input type="email" formControlName="email" placeholder="admin@foodepic.com" />
            <p class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">Email is required</p>
            <p class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">Enter a valid email</p>
          </div>

          <div class="form-field">
            <label>Password</label>
            <div class="password-wrap">
              <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••" />
              <button type="button" class="eye-btn" (click)="togglePassword()">
                <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
            <p class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">Password is required</p>
            <p class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">Min 6 characters</p>
          </div>

          <a href="#" class="forgot-link" (click)="$event.preventDefault()">Forgot Password?</a>

          <button type="submit" class="btn-primary btn-lg" [disabled]="loading">
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">Sign In</span>
          </button>
        </form>

        <p class="auth-switch">Don't have account? <a routerLink="/auth/register">Register</a></p>
      </div>
    </section>
  </div>
</ion-content>
